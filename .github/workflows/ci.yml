name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Check code style
        run: ./gradlew spotlessCheck
      - name: Static analysis (detekt) with profile and debug
        run: ./gradlew detektMain --profile --debug 2>&1 | tee detekt-debug.log
      - name: Upload detekt diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-diagnostics
          path: |
            build/reports/profile/
            detekt-debug.log
          retention-days: 7

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Test and assemble
        run: ./gradlew test assemble
