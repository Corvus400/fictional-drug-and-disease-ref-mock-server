name: CI Metrics
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
permissions:
  actions: read
  contents: read
jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Collect timing and jobs JSON
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p metrics
          gh api "repos/$REPO/actions/runs/$RUN_ID/timing" > metrics/timing.json
          gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" > metrics/jobs.json
          gh api "repos/$REPO/actions/runs/$RUN_ID" > metrics/run.json
      - name: Upload metrics artifact
        # actions/upload-artifact@v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-metrics-${{ github.event.workflow_run.id }}
          path: metrics/
          retention-days: 90
          if-no-files-found: error
